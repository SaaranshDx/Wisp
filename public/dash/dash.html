<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — Wisp</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 14px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      background: #111;
      border-radius: 8px;
      border: 1px solid #1f1f1f;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      text-decoration: none;
    }

    .nav-link {
      color: #6f6f73;
      text-decoration: none;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 140px 24px 80px;
    }

    h1 {
      font-size: 42px;
      font-weight: 300;
    }

    p {
      color: #aaa;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #111;
      border: 1px solid #222;
      color: white;
      border-radius: 6px;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 18px;
      background: #111;
      border: 1px solid #333;
      color: white;
      cursor: pointer;
      border-radius: 20px;
    }

    .btn:hover {
      border-color: #666;
    }

    .danger {
      border-color: #552222;
      color: #ff6b6b;
    }

    .section {
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <svg viewBox="0 0 477.959 477.959" xmlns="http://www.w3.org/2000/svg">
        <path d="M238.421,165.792c0,0,54.115-84.598,18.411-143.04C243.147,0.356,213.901-6.707,191.505,6.976c-16.049,9.805-24.223,27.601-22.533,45.14c-14.836-9.507-34.4-10.355-50.449-0.552c-22.396,13.683-29.459,42.93-15.777,65.327C138.452,175.333,238.421,165.792,238.421,165.792z"/>
        <path d="M260.801,202.423c0,0-54.115,84.596-18.41,143.04c13.684,22.396,42.932,29.46,65.328,15.775c16.047-9.804,24.223-27.6,22.53-45.14c14.837,9.509,34.402,10.357,50.449,0.553c22.396-13.683,29.459-42.931,15.777-65.325C360.771,192.881,260.801,202.423,260.801,202.423z"/>
        <path d="M426.744,126.001c-9.805-16.049-27.602-24.223-45.141-22.533c9.508-14.836,10.357-34.4,0.553-50.448c-13.684-22.396-42.93-29.46-65.326-15.778c-58.44,35.706-48.903,135.676-48.903,135.676s84.598,54.115,143.041,18.41C433.361,177.645,440.426,148.397,426.744,126.001z"/>
        <path d="M117.62,264.748c-9.508,14.835-10.357,34.4-0.551,50.447c13.682,22.396,42.93,29.459,65.324,15.777c58.445-35.705,48.904-135.676,48.904-135.676s-84.596-54.115-143.041-18.408c-22.395,13.682-29.459,42.93-15.775,65.326C82.286,258.263,100.081,266.437,117.62,264.748z"/>
      </svg>
      Wisp
    </a>
    <a class="nav-link" href="index.html" onclick="logout()">Logout</a>
  </nav>

<div class="page">

  <h1>Dashboard</h1>

  <div class="section">
    <h2>Company</h2>
    <p><strong>Company ID:</strong> <span id="company-id">...</span></p>
    <p><strong>Username:</strong> <span id="username">...</span></p>
  </div>

  <div class="section">
    <h2>Origin Management</h2>

    <p><strong>Current Origin:</strong> <span id="origin">...</span></p>

    <input id="origin-input" placeholder="https://your-app.com">

    <button class="btn" onclick="saveOrigin()">Save / Update</button>
    <button class="btn danger" onclick="deleteOrigin()">Delete</button>
  </div>

</div>

<script>
function fetchtoken() {
  const token = document.cookie
    .split("; ")
    .find((row) => row.startsWith("token="))
    ?.split("=")[1];

  return token ? decodeURIComponent(token) : null;
}

const token = fetchtoken();

function logout() {
  document.cookie = "token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
  location.reload();
}

async function loadDashboard() {
  if (!token) {
    alert("Not logged in");
    return;
  }

  const res = await fetch("http://localhost:5000/api/dashboard", {
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  const data = await res.json();

  document.getElementById("company-id").textContent = data.company_id;
  document.getElementById("username").textContent = data.username;
  document.getElementById("origin").textContent = data.origin || "Not set";

  if (data.origin) {
    document.getElementById("origin-input").value = data.origin;
  }
}

async function saveOrigin() {
  const origin = document.getElementById("origin-input").value;

  if (!origin) {
    alert("Enter an origin");
    return;
  }

  await fetch("http://localhost:5000/api/origin", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`
    },
    body: JSON.stringify({ origin })
  });

  loadDashboard();
}

async function deleteOrigin() {
  await fetch("http://localhost:5000/api/origin", {
    method: "DELETE",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  loadDashboard();
}

loadDashboard();
</script>

</body>
</html>
